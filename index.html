
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Nexus • Live Dashboard | Daily evolving AI tools & apps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 15% 5%, #020617 0%, #00010c 100%);
      font-family: 'Inter', sans-serif;
      color: #eef5ff;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    /* glassmorphic elements */
    .glass-panel {
      background: rgba(12, 25, 45, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(56, 128, 255, 0.3);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4);
    }

    .glass-card {
      background: rgba(8, 18, 32, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      border: 1px solid rgba(59, 130, 246, 0.35);
      transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
    }

    .glass-card:hover {
      border-color: #3b82f6;
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -14px rgba(59, 130, 246, 0.35);
      background: rgba(16, 32, 55, 0.85);
    }

    .hero-gradient {
      background: linear-gradient(115deg, #a5f3fc, #3b82f6, #8b5cf6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .chip {
      background: rgba(59, 130, 246, 0.18);
      border-radius: 40px;
      padding: 0.25rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      border: 0.5px solid rgba(59, 130, 246, 0.5);
    }

    .category-pill {
      background: rgba(30, 45, 75, 0.8);
      border-radius: 2rem;
      padding: 0.45rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(72, 120, 255, 0.3);
    }

    .category-pill.active {
      background: #2563eb;
      border-color: #60a5fa;
      color: white;
      box-shadow: 0 4px 12px #2563eb40;
    }

    .category-pill:hover:not(.active) {
      background: #1e3a8a60;
      border-color: #7aa2f7;
    }

    input, select {
      background: rgba(2, 10, 22, 0.85);
      border: 1px solid #2d3a5e;
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
    }

    .live-badge {
      background: #10b981;
      font-size: 0.65rem;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .update-animation {
      animation: pulse-ring 0.5s ease-out;
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); border-color: #3b82f6; }
      70% { box-shadow: 0 0 0 8px rgba(59,130,246,0); }
      100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a1220; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #2c3e66; border-radius: 10px; }

    .footer-glow {
      border-top: 1px solid rgba(59,130,246,0.2);
    }
    
    .developer-credit {
      background: linear-gradient(135deg, #3b82f680, #8b5cf680);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 md:py-8">

    <button data-cat="Productivity" class="category-pill">📎 Productivity</button>

  <!-- stats & dynamic update message -->
  <div class="glass-panel p-4 mb-8 flex flex-wrap items-center justify-between">
    <div class="flex gap-5 text-sm md:text-base">
      <div><i class="fas fa-database text-blue-400 mr-1"></i> <span id="totalToolsCount">0</span> AI resources</div>
      <div><i class="fas fa-calendar-day text-emerald-400 mr-1"></i> last update: <span id="lastUpdateTime">today</span></div>
      <div><i class="fas fa-chart-line text-cyan-400"></i> <span id="newTodayBadge">0 new today</span></div>
    </div>
    <div class="text-xs text-blue-200/80 flex gap-1"><i class="fas fa-sync"></i> dynamic feed • new apps added daily via community + crawler simulation</div>
  </div>

  <!-- AI tools grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 pb-12" id="dashboardGrid">
    <!-- loading state -->
    <div class="col-span-full flex justify-center p-12"><i class="fas fa-spinner fa-pulse text-3xl text-blue-400"></i></div>
  </div>

  <!-- footer & submission suggestion with developer credit -->
  <div class="footer-glow pt-8 mt-2 text-center text-gray-400 text-sm flex flex-wrap justify-between items-center gap-3">
    <div class="flex flex-col md:flex-row gap-2 items-center">
      <span>✨ AI Nexus — constantly evolving index of AI tools & apps | <span id="dynamicDate"></span></span>
      <span class="hidden md:inline mx-2">•</span>
      <span class="developer-credit text-sm"><i class="fas fa-code"></i> Developer: Syed Aamir</span>
    </div>
    <div class="flex gap-4"><i class="fab fa-github"></i> <i class="fab fa-discord"></i> <span class="hover:text-blue-300 cursor-pointer" id="simulateNewToolBtn"><i class="fas fa-plus-circle text-emerald-400"></i> suggest new tool</span></div>
  </div>
</div>

<script>
  // ---------- BASE AI DATABASE (core + daily expansion simulation) ----------
  let masterAITools = [

    { id: 21, name: "Otter.ai", url: "https://otter.ai", description: "Real-time meeting transcription & AI summaries.", category: "Productivity", icon: "fas fa-clipboard-list", featured: false, addedDate: "2025-05-05" },

    { id: 23, name: "Krea AI", url: "https://www.krea.ai", description: "Real-time generative canvas & upscaling.", category: "Image", icon: "fas fa-magic", featured: false, addedDate: "2025-05-04" },
    { id: 24, name: "Luma AI", url: "https://lumalabs.ai", description: "3D capture & NeRF video generation.", category: "Video", icon: "fas fa-cube", featured: true, addedDate: "2025-05-06" },
    { id: 25, name: "Poe AI", url: "https://poe.com", description: "Unified access to Claude, ChatGPT, Gemini.", category: "LLM", icon: "fas fa-comment-dots", featured: false, addedDate: "2025-05-01" },
    { id: 26, name: "Elicit", url: "https://elicit.com", description: "AI research assistant for literature review.", category: "Research", icon: "fas fa-flask", featured: true, addedDate: "2025-05-07" },
    { id: 27, name: "Consensus", url: "https://consensus.app", description: "AI-powered search from scientific papers.", category: "Research", icon: "fas fa-graduation-cap", featured: false, addedDate: "2025-05-02" },
    { id: 28, name: "Tabnine", url: "https://www.tabnine.com", description: "AI code completion & whole-line prediction.", category: "Coding", icon: "fas fa-laptop-code", featured: false, addedDate: "2025-05-03" },
    { id: 29, name: "Mubert", url: "https://mubert.com", description: "AI generated royalty-free music.", category: "Audio", icon: "fas fa-music", featured: false, addedDate: "2025-05-02" },
    { id: 30, name: "Fireflies.ai", url: "https://fireflies.ai", description: "Automated meeting notes & voice assistant.", category: "Productivity", icon: "fas fa-notes-medical", featured: false, addedDate: "2025-04-30" }
  ];

  // auxiliary dynamic additions (simulate "daily discovery" coming from community feed)
  let pendingDynamicAdditions = []; 

  // ---- helper: daily new tools that appeared today ----
  function getTodayDateStr() {
    return new Date().toISOString().slice(0,10);
  }

  // function to generate fresh AI tools from the "community stream" (simulates daily new urls/apps)
  function generateDailyFreshTools() {
    const today = getTodayDateStr();
    const freshSeeds = [
      { name: "DeepSeek Coder", url: "https://chat.deepseek.com", description: "Powerful open-source coding LLM with 1M context.", category: "Coding", icon: "fas fa-microchip" },
      { name: "Ideogram 2.0", url: "https://ideogram.ai", description: "Typography & design-focused image AI.", category: "Image", icon: "fas fa-font" },
      { name: "Viggle AI", url: "https://viggle.ai", description: "Character animation & motion control video AI.", category: "Video", icon: "fas fa-person-running" },
      { name: "Soundraw", url: "https://soundraw.io", description: "AI music generation for creators.", category: "Audio", icon: "fas fa-headphones" },
      { name: "Phind", url: "https://phind.com", description: "AI search engine tailored for devs & research.", category: "Research", icon: "fas fa-brain" },
      { name: "Mem AI", url: "https://mem.ai", description: "AI note-taking & second brain.", category: "Productivity", icon: "fas fa-database" }
    ];
    // pick 1-3 random fresh tools every day (based on deterministic seed but we run once per session)
    const shuffled = [...freshSeeds];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    const count = Math.floor(Math.random() * 3) + 1; // 1-3 new apps daily
    const freshAdds = shuffled.slice(0, count).map((seed, idx) => ({
      id: Date.now() + idx + Math.random() * 1000,
      name: seed.name,
      url: seed.url,
      description: seed.description,
      category: seed.category,
      icon: seed.icon,
      featured: false,
      addedDate: today,
      isNewToday: true
    }));
    return freshAdds;
  }

  // Merge dynamic daily tools into master list without duplicates (avoid adding same name twice)
  function mergeDailyNewTools() {
    const today = getTodayDateStr();
    // check if we already have tools added today? We'll refresh only once per day but the "daily update" flag.
    // we detect last dynamic update from localStorage or memory
    const lastDynamicDateKey = "ai_nexus_last_dynamic_update";
    const lastUpdateDate = localStorage.getItem(lastDynamicDateKey);
    if (lastUpdateDate !== today) {
      const freshTools = generateDailyFreshTools();
      let addedCount = 0;
      for (const fresh of freshTools) {
        const alreadyExists = masterAITools.some(t => t.name.toLowerCase() === fresh.name.toLowerCase());
        if (!alreadyExists) {
          masterAITools.push({ ...fresh, id: masterAITools.length + Date.now() + addedCount });
          addedCount++;
        }
      }
      if (addedCount > 0) {
        localStorage.setItem(lastDynamicDateKey, today);
        showUpdateNotification(addedCount);
      }
    }
    // update last updated UI
    const lastSyncDate = localStorage.getItem(lastDynamicDateKey) || getTodayDateStr();
    document.getElementById("lastUpdateTime").innerText = new Date(lastSyncDate).toLocaleDateString();
    const newTodayCount = masterAITools.filter(t => t.addedDate === getTodayDateStr()).length;
    document.getElementById("newTodayBadge").innerHTML = `${newTodayCount} new today ✨`;
  }

  function showUpdateNotification(count) {
    const badgeEl = document.getElementById("newTodayBadge");
    if (badgeEl) {
      badgeEl.classList.add("update-animation");
      setTimeout(() => badgeEl.classList.remove("update-animation"), 600);
    }
    const grid = document.getElementById("dashboardGrid");
    if(grid) {
      const tempMsg = document.createElement("div");
      tempMsg.className = "fixed bottom-5 right-5 glass-panel px-4 py-2 text-sm z-50 animate-pulse";
      tempMsg.innerHTML = `<i class="fas fa-plus-circle text-emerald-400 mr-2"></i> ${count} new AI tool${count>1 ? 's' : ''} added today!`;
      document.body.appendChild(tempMsg);
      setTimeout(() => tempMsg.remove(), 2800);
    }
  }

  // -------- FILTER & RENDER engine ----------
  let currentCategory = "all";
  let currentSearch = "";

  function getFilteredTools() {
    return masterAITools.filter(tool => {
      const matchCat = currentCategory === "all" || tool.category === currentCategory;
      const matchSearch = tool.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                          tool.description.toLowerCase().includes(currentSearch.toLowerCase()) ||
                          tool.url.toLowerCase().includes(currentSearch.toLowerCase());
      return matchCat && matchSearch;
    });
  }

function renderDashboard() {
    const filtered = getFilteredTools();
    const gridContainer = document.getElementById("dashboardGrid");
