<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Nexus • Live Dashboard | Daily evolving AI tools & apps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f0d2d 100%);
      font-family: 'Inter', sans-serif;
      color: #e0f2fe;
      line-height: 1.6;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
    }

    /* ENHANCED HEADER SECTION */
    .hero-header-wrapper {
      text-align: center;
      margin-bottom: 2rem;
      padding: 2rem 0;
    }

    .nexus-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .rocket-icon-large {
      font-size: 5rem;
      background: linear-gradient(135deg, #3b82f6, #06b6d4, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6)) drop-shadow(0 0 40px rgba(139, 92, 246, 0.4));
      animation: float-rocket 3s ease-in-out infinite, pulse-rocket 2s ease-in-out infinite;
    }

    @keyframes float-rocket {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    @keyframes pulse-rocket {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6)) drop-shadow(0 0 40px rgba(139, 92, 246, 0.4)); }
      50% { filter: drop-shadow(0 0 40px rgba(59, 130, 246, 1)) drop-shadow(0 0 60px rgba(139, 92, 246, 0.7)); }
    }

    .nexus-title {
      font-family: 'Righteous', 'Space Mono', monospace;
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: 4px;
      line-height: 1;
      margin: 0;
      background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 25%, #8b5cf6 50%, #ec4899 75%, #06b6d4 100%);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 8s ease infinite;
      text-shadow: 0 0 60px rgba(59, 130, 246, 0.5);
      filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5));
      position: relative;
      z-index: 3;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .nexus-subtitle {
      font-size: 0.95rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 0.5rem;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .nexus-glow-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
    }

    /* Glassmorphism Panels */
    .glass-panel {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 1.5rem;
      border: 1px solid rgba(56, 128, 255, 0.4);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .glass-card {
      background: rgba(10, 15, 30, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 1.25rem;
      border: 1.5px solid rgba(59, 130, 246, 0.4);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s;
    }

    .glass-card:hover::before {
      left: 100%;
    }

    .glass-card:hover {
      border-color: #0ea5e9;
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 40px rgba(14, 165, 233, 0.25),
                  0 0 60px rgba(59, 130, 246, 0.2),
                  inset 0 1px 0 rgba(255, 255, 255, 0.2);
      background: rgba(15, 28, 50, 0.9);
    }

    /* Header Gradient */
    .hero-gradient {
      background: linear-gradient(135deg, #06b6d4, #3b82f6, #8b5cf6, #ec4899);
      background-size: 300% 300%;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: gradientShift 8s ease infinite;
    }

    /* Digital Display Elements */
    .digital-badge {
      background: rgba(6, 182, 212, 0.15);
      border: 1.5px solid #06b6d4;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      font-family: 'Space Mono', monospace;
      color: #06b6d4;
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
      text-transform: uppercase;
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
      50% { box-shadow: 0 0 40px rgba(6, 182, 212, 0.6); }
    }

    .chip {
      background: rgba(59, 130, 246, 0.2);
      border-radius: 50px;
      padding: 0.4rem 1.2rem;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid rgba(59, 130, 246, 0.6);
      color: #60a5fa;
      font-family: 'Space Mono', monospace;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }

    /* ENHANCED CATEGORY PILLS WITH VIBRANT COLORS */
    .category-pill {
      background: rgba(30, 45, 75, 0.6);
      border-radius: 50px;
      padding: 0.8rem 1.6rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 2px solid rgba(72, 120, 255, 0.3);
      position: relative;
      overflow: hidden;
      color: #e0f2fe;
      white-space: nowrap;
    }

    .category-pill::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(59, 130, 246, 0.3);
      transition: left 0.3s;
      z-index: -1;
    }

    .category-pill:hover::before {
      left: 100%;
    }

    .category-pill.active {
      transform: scale(1.08);
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.5),
                  inset 0 0 10px rgba(255, 255, 255, 0.1);
    }

    /* All Tools */
    .category-pill[data-cat="all"].active {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      border-color: #0ea5e9;
      color: #ffffff;
    }

    .category-pill[data-cat="all"]:hover:not(.active) {
      background: rgba(6, 182, 212, 0.2);
      border-color: #06b6d4;
      color: #22d3ee;
    }

    /* LLM & Chat */
    .category-pill[data-cat="LLM"].active {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-color: #60a5fa;
      color: #ffffff;
    }

    .category-pill[data-cat="LLM"]:hover:not(.active) {
      background: rgba(59, 130, 246, 0.2);
      border-color: #3b82f6;
      color: #93c5fd;
    }

    /* Image Gen */
    .category-pill[data-cat="Image"].active {
      background: linear-gradient(135deg, #ec4899, #db2777);
      border-color: #f472b6;
      color: #ffffff;
    }

    .category-pill[data-cat="Image"]:hover:not(.active) {
      background: rgba(236, 72, 153, 0.2);
      border-color: #ec4899;
      color: #f472b6;
    }

    /* Video */
    .category-pill[data-cat="Video"].active {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      border-color: #c4b5fd;
      color: #ffffff;
    }

    .category-pill[data-cat="Video"]:hover:not(.active) {
      background: rgba(139, 92, 246, 0.2);
      border-color: #8b5cf6;
      color: #ddd6fe;
    }

    /* Audio */
    .category-pill[data-cat="Audio"].active {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-color: #fbbf24;
      color: #ffffff;
    }

    .category-pill[data-cat="Audio"]:hover:not(.active) {
      background: rgba(245, 158, 11, 0.2);
      border-color: #f59e0b;
      color: #fcd34d;
    }

    /* Coding */
    .category-pill[data-cat="Coding"].active {
      background: linear-gradient(135deg, #10b981, #059669);
      border-color: #6ee7b7;
      color: #ffffff;
    }

    .category-pill[data-cat="Coding"]:hover:not(.active) {
      background: rgba(16, 185, 129, 0.2);
      border-color: #10b981;
      color: #6ee7b7;
    }

    /* Productivity */
    .category-pill[data-cat="Productivity"].active {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      border-color: #22d3ee;
      color: #ffffff;
    }

    .category-pill[data-cat="Productivity"]:hover:not(.active) {
      background: rgba(6, 182, 212, 0.2);
      border-color: #06b6d4;
      color: #22d3ee;
    }

    /* Research */
    .category-pill[data-cat="Research"].active {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-color: #fca5a5;
      color: #ffffff;
    }

    .category-pill[data-cat="Research"]:hover:not(.active) {
      background: rgba(239, 68, 68, 0.2);
      border-color: #ef4444;
      color: #fca5a5;
    }

    input, select {
      background: rgba(2, 10, 22, 0.9);
      border: 2px solid rgba(45, 58, 94, 0.7);
      border-radius: 50px;
      padding: 0.8rem 1.4rem;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.3s;
      font-size: 0.95rem;
    }

    input::placeholder {
      color: rgba(148, 163, 184, 0.6);
    }

    input:focus, select:focus {
      border-color: #06b6d4;
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2),
                  inset 0 0 10px rgba(6, 182, 212, 0.1);
      background: rgba(6, 182, 212, 0.05);
    }

    /* Stat Cards */
    .stat-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: rgba(15, 28, 50, 0.5);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 1rem;
      transition: all 0.3s;
    }

    .stat-card:hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: #06b6d4;
      transform: translateX(4px);
    }

    .stat-icon {
      font-size: 1.5rem;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(59, 130, 246, 0.2);
      border-radius: 8px;
      border: 1px solid rgba(59, 130, 246, 0.4);
    }

    .stat-card.blue .stat-icon { background: rgba(59, 130, 246, 0.25); border-color: #3b82f6; color: #60a5fa; }
    .stat-card.green .stat-icon { background: rgba(16, 185, 129, 0.25); border-color: #10b981; color: #6ee7b7; }
    .stat-card.cyan .stat-icon { background: rgba(6, 182, 212, 0.25); border-color: #06b6d4; color: #22d3ee; }
    .stat-card.purple .stat-icon { background: rgba(139, 92, 246, 0.25); border-color: #8b5cf6; color: #c4b5fd; }

    .stat-value {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-value-num {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
    }

    .stat-value-label {
      font-size: 0.75rem;
      color: rgba(148, 163, 184, 0.8);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .live-badge {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.9), rgba(220, 38, 38, 0.9));
      font-size: 0.65rem;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      font-family: 'Space Mono', monospace;
      border: 1px solid rgba(239, 68, 68, 0.6);
      animation: pulse-badge 2s ease-in-out infinite;
    }

    @keyframes pulse-badge {
      0%, 100% { box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.8); }
    }

    .featured-badge {
      background: linear-gradient(135deg, rgba(251, 146, 60, 0.9), rgba(245, 158, 11, 0.9));
      font-size: 0.65rem;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      font-family: 'Space Mono', monospace;
      border: 1px solid rgba(251, 146, 60, 0.6);
    }

    /* Tool Card Enhanced */
    .tool-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
      gap: 1rem;
    }

    .tool-icon-wrapper {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(139, 92, 246, 0.3));
      border: 1.5px solid rgba(59, 130, 246, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #60a5fa;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
      flex-shrink: 0;
    }

    .tool-info {
      flex: 1;
    }

    .tool-name {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .tool-category {
      font-size: 0.75rem;
      color: #60a5fa;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }

    .tool-external-link {
      color: #0ea5e9;
      transition: all 0.3s;
      font-size: 1.2rem;
      opacity: 0.7;
    }

    .tool-external-link:hover {
      color: #ffffff;
      opacity: 1;
      transform: translate(2px, -2px);
    }

    .tool-description {
      margin: 1rem 0;
      color: #cbd5e1;
      font-size: 0.95rem;
      line-height: 1.6;
      flex-grow: 1;
    }

    .tool-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid rgba(59, 130, 246, 0.2);
      gap: 1rem;
    }

    .tool-hostname {
      font-size: 0.8rem;
      color: rgba(96, 165, 250, 0.6);
      font-family: 'Courier Prime', monospace;
      font-weight: 600;
    }

    .tool-launch-btn {
      font-size: 0.85rem;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.4), rgba(6, 182, 212, 0.3));
      border: 1px solid rgba(59, 130, 246, 0.5);
      color: #60a5fa;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s;
      font-weight: 600;
      white-space: nowrap;
      text-decoration: none;
    }

    .tool-launch-btn:hover {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.8), rgba(6, 182, 212, 0.7));
      border-color: #0ea5e9;
      color: #ffffff;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }

    /* Grid Layout */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      padding-bottom: 3rem;
    }

    @media (min-width: 1024px) {
      .grid-container {
        grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      }
    }

    @media (min-width: 1280px) {
      .grid-container {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #3b82f6, #06b6d4);
      border-radius: 10px;
      border: 2px solid rgba(15, 23, 42, 0.5);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #60a5fa, #22d3ee);
    }

    /* Footer */
    .footer-section {
      border-top: 1px solid rgba(59, 130, 246, 0.25);
      padding-top: 2rem;
      margin-top: 3rem;
    }

    .developer-credit {
      background: linear-gradient(135deg, #3b82f6, #06b6d4, #8b5cf6);
      background-size: 300% 300%;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      animation: gradientShift 8s ease infinite;
    }

    /* Visitor Counter */
    .visitor-counter {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 1rem;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.4);
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: 'Space Mono', monospace;
      color: #c4b5fd;
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
      animation: pulse-visitor 2s ease-in-out infinite;
    }

    .visitor-counter i {
      font-size: 0.9rem;
    }

    .visitor-count {
      font-size: 0.9rem;
      font-weight: 700;
      color: #ddd6fe;
    }

    @keyframes pulse-visitor {
      0%, 100% { box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
      50% { box-shadow: 0 0 30px rgba(139, 92, 246, 0.5); }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      background: rgba(15, 28, 50, 0.4);
      border-radius: 1.5rem;
      border: 2px dashed rgba(59, 130, 246, 0.2);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }

    .empty-state-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .empty-state-text {
      color: rgba(148, 163, 184, 0.8);
      font-size: 0.95rem;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(10, 15, 30, 0.95);
      border: 1.5px solid rgba(59, 130, 246, 0.6);
      border-radius: 50px;
      padding: 1rem 1.5rem;
      font-size: 0.9rem;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      animation: slideIn 0.3s ease-out;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .grid-container {
        grid-template-columns: 1fr;
      }

      .nexus-title {
        font-size: 3rem;
        letter-spacing: 2px;
      }

      .rocket-icon-large {
        font-size: 3rem;
      }

      .stat-card {
        padding: 0.75rem 1rem;
      }

      .stat-value-num {
        font-size: 1.25rem;
      }

      .category-pill {
        padding: 0.6rem 1.2rem;
        font-size: 0.8rem;
      }

      .visitor-counter {
        font-size: 0.7rem;
        padding: 0.4rem 0.8rem;
      }
    }
  </style>
</head>

<div class="nexus-glow-box"></div>

  // ========== VISITOR COUNTER SYSTEM ==========
  function initializeVisitorCounter() {
    const VISITOR_KEY = 'ai_nexus_visitors';
    const VISITOR_SESSION_KEY = 'ai_nexus_session_id';
    
    let sessionId = sessionStorage.getItem(VISITOR_SESSION_KEY);
    if (!sessionId) {
      sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      sessionStorage.setItem(VISITOR_SESSION_KEY, sessionId);
    }
    
    let visitors = JSON.parse(localStorage.getItem(VISITOR_KEY)) || [];
    
    const today = new Date().toISOString().split('T')[0];
    const todayVisitors = visitors.filter(v => v.date === today);
    const isNewVisitor = !todayVisitors.some(v => v.sessionId === sessionId);
    
    if (isNewVisitor) {
      visitors.push({
        sessionId: sessionId,
        date: today,
        timestamp: Date.now()
      });
      localStorage.setItem(VISITOR_KEY, JSON.stringify(visitors));
    }
    
    const uniqueSessions = new Set(visitors.map(v => v.sessionId));
    const totalVisitors = uniqueSessions.size;
    
    const visitorCounter = document.getElementById('visitorCounter');
    const visitorCountDisplay = document.getElementById('visitorCountDisplay');
    
    if (visitorCounter) visitorCounter.textContent = totalVisitors;
    if (visitorCountDisplay) visitorCountDisplay.textContent = totalVisitors;
    
    return totalVisitors;
  }

  // ========== STATE & HELPERS ==========
  let currentCategory = "all";
  let currentSearch = "";

  function getFilteredTools() {
    return masterAITools.filter(tool => {
      const matchCat = currentCategory === "all" || tool.category === currentCategory;
      const matchSearch = currentSearch === "" || 
                          tool.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                          tool.description.toLowerCase().includes(currentSearch.toLowerCase()) ||
                          tool.url.toLowerCase().includes(currentSearch.toLowerCase());
      return matchCat && matchSearch;
    });
  }

  function renderTools() {
    const grid = document.getElementById('dashboardGrid');
    const filtered = getFilteredTools();

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div style="grid-column: 1/-1;" class="empty-state">
          <div class="empty-state-icon">🔍</div>
          <div class="empty-state-title">No tools found</div>
          <div class="empty-state-text">Try adjusting your filters or search query</div>
        </div>
      `;
      return;
    }

    grid.innerHTML = filtered.map(tool => `
      <div class="glass-card p-5" onclick="window.open('${tool.url}', '_blank')">
        <div class="tool-card-header">
          <div class="tool-icon-wrapper">
            <i class="${tool.icon}"></i>
          </div>
          <a href="${tool.url}" target="_blank" class="tool-external-link" onclick="event.stopPropagation()">
            <i class="fas fa-external-link-alt"></i>
          </a>
        </div>
        <div class="tool-info">
          <div class="tool-name">
            ${tool.name}
            ${tool.featured ? '<span class="featured-badge">⭐ Featured</span>' : ''}
          </div>
          <div class="tool-category">${tool.category}</div>
        </div>
        <div class="tool-description">${tool.description}</div>
        <div class="tool-footer">
          <div class="tool-hostname">${new URL(tool.url).hostname}</div>
          <a href="${tool.url}" target="_blank" class="tool-launch-btn" onclick="event.stopPropagation()">
            <i class="fas fa-arrow-right"></i> Launch
          </a>
        </div>
      </div>
    `).join('');
  }

  function updateStats() {
    const filtered = getFilteredTools();
    document.getElementById('totalToolsCount').textContent = masterAITools.length;
    document.getElementById('newTodayBadge').textContent = Math.floor(Math.random() * 5) + 1;
    
    const today = new Date();
    const options = { weekday: 'short', month: 'short', day: 'numeric' };
    document.getElementById('lastUpdateTime').textContent = today.toLocaleDateString('en-US', options);
  }

  function setupEventListeners() {
    document.getElementById('globalSearch').addEventListener('input', (e) => {
      currentSearch = e.target.value;
      renderTools();
    });

    document.getElementById('categorySelector').addEventListener('change', (e) => {
      currentCategory = e.target.value;
      renderTools();
      document.querySelectorAll('.category-pill').forEach(pill => {
        pill.classList.remove('active');
        if (pill.dataset.cat === currentCategory) pill.classList.add('active');
      });
    });

    document.querySelectorAll('.category-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        currentCategory = pill.dataset.cat;
        document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        document.getElementById('categorySelector').value = currentCategory;
        renderTools();
      });
    });

    document.getElementById('manualRefreshBtn').addEventListener('click', () => {
      renderTools();
      showToast('Tools refreshed! 🔄');
    });

    const dateElem = document.getElementById('dynamicDate');
    if (dateElem) {
      const today = new Date();
      dateElem.textContent = today.toISOString().split('T')[0];
    }
  }

  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas fa-check-circle text-emerald-400"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ========== INITIALIZE ==========
  document.addEventListener('DOMContentLoaded', () => {
    initializeVisitorCounter();
    updateStats();
    renderTools();
    setupEventListeners();
  });
</script>
