<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Nexus • Live Dashboard | Daily evolving AI tools & apps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 15% 5%, #020617 0%, #00010c 100%);
      font-family: 'Inter', sans-serif;
      color: #eef5ff;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    .glass-panel {
      background: rgba(12, 25, 45, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(56, 128, 255, 0.3);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4);
    }

    .glass-card {
      background: rgba(8, 18, 32, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      border: 1px solid rgba(59, 130, 246, 0.35);
      transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
      cursor: pointer;
    }

    .glass-card:hover {
      border-color: #3b82f6;
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -14px rgba(59, 130, 246, 0.35);
      background: rgba(16, 32, 55, 0.85);
    }

    .hero-gradient {
      background: linear-gradient(115deg, #a5f3fc, #3b82f6, #8b5cf6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .chip {
      background: rgba(59, 130, 246, 0.18);
      border-radius: 40px;
      padding: 0.25rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      border: 0.5px solid rgba(59, 130, 246, 0.5);
    }

    .category-pill {
      background: rgba(30, 45, 75, 0.8);
      border-radius: 2rem;
      padding: 0.45rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(72, 120, 255, 0.3);
    }

    .category-pill.active {
      background: #2563eb;
      border-color: #60a5fa;
      color: white;
      box-shadow: 0 4px 12px #2563eb40;
    }

    .category-pill:hover:not(.active) {
      background: #1e3a8a60;
      border-color: #7aa2f7;
    }

    input, select {
      background: rgba(2, 10, 22, 0.85);
      border: 1px solid #2d3a5e;
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
    }

    .live-badge {
      background: #10b981;
      font-size: 0.65rem;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a1220; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #2c3e66; border-radius: 10px; }

    .footer-glow {
      border-top: 1px solid rgba(59,130,246,0.2);
    }
    
    .developer-credit {
      background: linear-gradient(135deg, #3b82f680, #8b5cf680);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 md:py-8">
  <!-- header -->
  <div class="flex flex-wrap justify-between items-center gap-4 mb-8">
    <div class="flex items-center gap-3">
      <div class="text-4xl"><i class="fas fa-arrows-spin text-blue-400"></i></div>
      <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight">AI<span class="hero-gradient">NEXUS</span></h1>
      <div class="chip hidden lg:inline-flex"><i class="fas fa-sync-alt text-emerald-400 text-xs mr-1"></i> daily auto-refresh</div>
    </div>
    <div class="flex flex-wrap gap-3 items-center">
      <div class="relative">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        <input type="text" id="globalSearch" placeholder="Search AI app, URL, tool..." class="pl-10 pr-4 w-56 md:w-72 text-sm">
      </div>
      <div class="relative">
        <select id="categorySelector" class="pl-4 pr-8 text-sm appearance-none cursor-pointer">
          <option value="all">📁 All categories</option>
          <option value="LLM">💬 LLM & Chat</option>
          <option value="Image">🎨 Image</option>
          <option value="Video">🎥 Video</option>
          <option value="Audio">🎧 Audio & Voice</option>
          <option value="Coding">⚙️ Coding Agents</option>
          <option value="Productivity">📊 Productivity</option>
          <option value="Research">🔬 Research</option>
        </select>
        <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 text-xs pointer-events-none"></i>
      </div>
      <button id="manualRefreshBtn" class="bg-blue-600/30 hover:bg-blue-600/60 backdrop-blur-sm px-4 py-2 rounded-full text-sm font-medium transition flex items-center gap-2 border border-blue-500/30">
        <i class="fas fa-cloud-arrow-up"></i> <span>Sync now</span>
      </button>
    </div>
  </div>

  <!-- category quick filters -->
  <div class="flex flex-wrap gap-2 justify-start mb-6 overflow-x-auto pb-2" id="categoryFilterBar">
    <button data-cat="all" class="category-pill active">🌐 All tools</button>
    <button data-cat="LLM" class="category-pill">💬 LLM</button>
    <button data-cat="Image" class="category-pill">🎨 Image</button>
    <button data-cat="Video" class="category-pill">🎥 Video</button>
    <button data-cat="Audio" class="category-pill">🎧 Audio</button>
    <button data-cat="Coding" class="category-pill">🤖 Coding</button>
    <button data-cat="Productivity" class="category-pill">📎 Productivity</button>
    <button data-cat="Research" class="category-pill">🔬 Research</button>
  </div>

  <!-- stats -->
  <div class="glass-panel p-4 mb-8 flex flex-wrap items-center justify-between">
    <div class="flex gap-5 text-sm md:text-base">
      <div><i class="fas fa-database text-blue-400 mr-1"></i> <span id="totalToolsCount">0</span> AI resources</div>
      <div><i class="fas fa-calendar-day text-emerald-400 mr-1"></i> last update: <span id="lastUpdateTime">today</span></div>
      <div><i class="fas fa-chart-line text-cyan-400"></i> <span id="newTodayBadge">0 new today</span></div>
    </div>
    <div class="text-xs text-blue-200/80 flex gap-1"><i class="fas fa-sync"></i> dynamic feed • new apps added daily</div>
  </div>

  <!-- AI tools grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 pb-12" id="dashboardGrid">
    <!-- Loading -->
    <div class="col-span-full flex justify-center p-12"><i class="fas fa-spinner fa-pulse text-3xl text-blue-400"></i> Loading AI tools...</div>
  </div>

  <!-- footer -->
  <div class="footer-glow pt-8 mt-2 text-center text-gray-400 text-sm flex flex-wrap justify-between items-center gap-3">
    <div class="flex flex-col md:flex-row gap-2 items-center">
      <span>✨ AI Nexus — constantly evolving index of AI tools & apps | <span id="dynamicDate"></span></span>
      <span class="hidden md:inline mx-2">•</span>
      <span class="developer-credit text-sm"><i class="fas fa-code"></i> Developer: Syed Aamir</span>
    </div>
    <div class="flex gap-4"><i class="fab fa-github"></i> <i class="fab fa-discord"></i> <span class="hover:text-blue-300 cursor-pointer" id="simulateNewToolBtn"><i class="fas fa-plus-circle text-emerald-400"></i> suggest new tool</span></div>
  </div>
</div>

<script>
  // ========== COMPLETE AI TOOLS DATABASE (FIXED - WILL DISPLAY IMMEDIATELY) ==========
  const masterAITools = [
    { id: 1, name: "ChatGPT", url: "https://chat.openai.com", description: "Flagship conversational AI by OpenAI. GPT-4o, multimodal capabilities.", category: "LLM", icon: "fab fa-chat", featured: true },
    { id: 2, name: "Claude 3.5", url: "https://claude.ai", description: "Anthropic's most advanced assistant with 200K context window.", category: "LLM", icon: "fas fa-comments", featured: true },
    { id: 3, name: "Midjourney v6", url: "https://www.midjourney.com", description: "State of art AI image synthesis with incredible realism.", category: "Image", icon: "fas fa-palette", featured: true },
    { id: 4, name: "DALL·E 3", url: "https://openai.com/dall-e-3", description: "High fidelity text-to-image with ChatGPT integration.", category: "Image", icon: "fas fa-image", featured: true },
    { id: 5, name: "Runway Gen-3", url: "https://runwayml.com", description: "AI video generation & advanced editing tools.", category: "Video", icon: "fas fa-video", featured: true },
    { id: 6, name: "ElevenLabs", url: "https://elevenlabs.io", description: "Multilingual TTS, voice cloning for creators.", category: "Audio", icon: "fas fa-microphone-alt", featured: true },
    { id: 7, name: "GitHub Copilot", url: "https://github.com/features/copilot", description: "AI pair programmer inside VS Code & IDE.", category: "Coding", icon: "fab fa-github", featured: true },
    { id: 8, name: "Perplexity AI", url: "https://www.perplexity.ai", description: "AI search engine with real-time citations.", category: "LLM", icon: "fas fa-search", featured: false },
    { id: 9, name: "Stable Diffusion 3", url: "https://stability.ai", description: "Cutting-edge open image synthesis model.", category: "Image", icon: "fas fa-draw-polygon", featured: false },
    { id: 10, name: "Pika Labs 2.0", url: "https://pika.art", description: "Text-to-video with motion controls.", category: "Video", icon: "fas fa-film", featured: true },
    { id: 11, name: "Descript", url: "https://www.descript.com", description: "Podcast & video editing AI (Overdub).", category: "Audio", icon: "fas fa-waveform", featured: false },
    { id: 12, name: "Replit AI", url: "https://replit.com/ai", description: "AI coding & debugging inside browser IDE.", category: "Coding", icon: "fas fa-code", featured: false },
    { id: 13, name: "Notion AI", url: "https://www.notion.so/product/ai", description: "AI-powered notes & docs assistant.", category: "Productivity", icon: "fas fa-file-alt", featured: true },
    { id: 14, name: "Gamma AI", url: "https://gamma.app", description: "Generate stunning presentations & decks.", category: "Productivity", icon: "fas fa-chalkboard", featured: true },
    { id: 15, name: "Leonardo.ai", url: "https://leonardo.ai", description: "Generative asset creation for games & art.", category: "Image", icon: "fas fa-brush", featured: false },
    { id: 16, name: "HeyGen", url: "https://www.heygen.com", description: "AI avatar video translator & presenter.", category: "Video", icon: "fas fa-user-astronaut", featured: false },
    { id: 17, name: "Whisper", url: "https://openai.com/research/whisper", description: "Robust speech recognition & transcription.", category: "Audio", icon: "fas fa-ear-listen", featured: false },
    { id: 18, name: "Google Gemini", url: "https://gemini.google.com", description: "Multimodal AI from Google (Ultra 1.0).", category: "LLM", icon: "fab fa-google", featured: true },
    { id: 19, name: "AutoGPT", url: "https://github.com/Significant-Gravitas/AutoGPT", description: "Autonomous task-solving agents.", category: "Coding", icon: "fas fa-robot", featured: false },
    { id: 20, name: "Synthesia", url: "https://www.synthesia.io", description: "AI avatar videos from text.", category: "Video", icon: "fas fa-camera", featured: true },
    { id: 21, name: "Otter.ai", url: "https://otter.ai", description: "Real-time meeting transcription & AI summaries.", category: "Productivity", icon: "fas fa-clipboard-list", featured: false },
    { id: 22, name: "Jasper AI", url: "https://www.jasper.ai", description: "AI writing for marketing & teams.", category: "Productivity", icon: "fas fa-pen-fancy", featured: false },
    { id: 23, name: "Krea AI", url: "https://www.krea.ai", description: "Real-time generative canvas & upscaling.", category: "Image", icon: "fas fa-magic", featured: false },
    { id: 24, name: "Luma AI", url: "https://lumalabs.ai", description: "3D capture & NeRF video generation.", category: "Video", icon: "fas fa-cube", featured: true },
    { id: 25, name: "Poe AI", url: "https://poe.com", description: "Unified access to Claude, ChatGPT, Gemini.", category: "LLM", icon: "fas fa-comment-dots", featured: false },
    { id: 26, name: "Elicit", url: "https://elicit.com", description: "AI research assistant for literature review.", category: "Research", icon: "fas fa-flask", featured: true },
    { id: 27, name: "Consensus", url: "https://consensus.app", description: "AI-powered search from scientific papers.", category: "Research", icon: "fas fa-graduation-cap", featured: false },
    { id: 28, name: "Tabnine", url: "https://www.tabnine.com", description: "AI code completion & whole-line prediction.", category: "Coding", icon: "fas fa-laptop-code", featured: false },
    { id: 29, name: "Mubert", url: "https://mubert.com", description: "AI generated royalty-free music.", category: "Audio", icon: "fas fa-music", featured: false },
    { id: 30, name: "Fireflies.ai", url: "https://fireflies.ai", description: "Automated meeting notes & voice assistant.", category: "Productivity", icon: "fas fa-notes-medical", featured: false },
    { id: 31, name: "DeepSeek", url: "https://chat.deepseek.com", description: "Powerful open-source coding LLM with 1M context.", category: "Coding", icon: "fas fa-microchip", featured: true },
    { id: 32, name: "Ideogram", url: "https://ideogram.ai", description: "Typography & design-focused image AI.", category: "Image", icon: "fas fa-font", featured: false },
    { id: 33, name: "Viggle AI", url: "https://viggle.ai", description: "Character animation & motion control video AI.", category: "Video", icon: "fas fa-person-running", featured: false },
    { id: 34, name: "Soundraw", url: "https://soundraw.io", description: "AI music generation for creators.", category: "Audio", icon: "fas fa-headphones", featured: false },
    { id: 35, name: "Phind", url: "https://phind.com", description: "AI search engine tailored for devs & research.", category: "Research", icon: "fas fa-brain", featured: false }
  ];

  // State variables
  let currentCategory = "all";
  let currentSearch = "";

  // Helper functions
  function getTodayDateStr() {
    return new Date().toISOString().slice(0,10);
  }

  function getFilteredTools() {
    return masterAITools.filter(tool => {
      const matchCat = currentCategory === "all" || tool.category === currentCategory;
      const matchSearch = currentSearch === "" || 
                          tool.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                          tool.description.toLowerCase().includes(currentSearch.toLowerCase()) ||
                          tool.url.toLowerCase().includes(currentSearch.toLowerCase());
      return matchCat && matchSearch;
    });
  }

  function renderDashboard() {
    const filtered = getFilteredTools();
    const gridContainer = document.getElementById("dashboardGrid");
    const totalSpan = document.getElementById("totalToolsCount");
    
    if (totalSpan) totalSpan.innerText = filtered.length;

    if (filtered.length === 0) {
      gridContainer.innerHTML = `<div class="col-span-full flex flex-col items-center gap-3 glass-panel p-12">
        <i class="fas fa-ghost text-5xl text-blue-400/60"></i>
        <h3 class="text-xl">No AI resources found</h3>
        <p class="text-gray-300">Try different keywords or category ✨</p>
      </div>`;
      return;
    }

    gridContainer.innerHTML = filtered.map(tool => {
      let hostname = "";
      try {
        hostname = new URL(tool.url).hostname.replace('www.', '');
      } catch(e) {
        hostname = tool.url.split('/')[2] || "ai.tool";
      }
      
      return `
        <div class="glass-card p-5 flex flex-col h-full transition-all">
          <div class="flex justify-between items-start">
            <div class="flex gap-3 items-center">
              <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600/30 to-indigo-600/30 flex items-center justify-center text-blue-300 border border-blue-500/40">
                <i class="${tool.icon || 'fas fa-microchip'} text-xl"></i>
              </div>
              <div>
                <div class="flex items-center gap-2 flex-wrap">
                  <h3 class="font-bold text-md md:text-lg">${tool.name}</h3>
                  ${tool.featured ? '<span class="live-badge bg-amber-600/70 text-[10px]">⭐ featured</span>' : ''}
                </div>
                <p class="text-xs text-blue-200/60">${tool.category}</p>
              </div>
            </div>
            <a href="${tool.url}" target="_blank" rel="noopener noreferrer" class="text-blue-400 hover:text-white transition"><i class="fas fa-external-link-alt text-sm"></i></a>
          </div>
          <p class="mt-3 text-gray-200 text-sm leading-relaxed flex-grow">${tool.description}</p>
          <div class="mt-4 flex justify-between items-center pt-2 border-t border-white/10">
            <span class="text-[11px] text-blue-300/60 font-mono">${hostname}</span>
            <a href="${tool.url}" target="_blank" class="text-xs bg-blue-700/40 hover:bg-blue-600 px-3 py-1.5 rounded-full flex items-center gap-1 transition">Launch <i class="fas fa-arrow-right text-[9px]"></i></a>
          </div>
        </div>
      `;
    }).join('');
  }

  // Add new tool function
  function addCommunityTool() {
    const newToolNames = ["Hugging Face Chat", "Cohere Coral", "Recraft AI", "Kaiber", "WellSaid", "Codium AI", "Typeface"];
    const randomName = newToolNames[Math.floor(Math.random() * newToolNames.length)];
    const categoriesList = ["LLM", "Image", "Video", "Audio", "Coding", "Productivity", "Research"];
    const randomCat = categoriesList[Math.floor(Math.random() * categoriesList.length)];
    const randomDesc = `Innovative AI tool for ${randomCat} domain — discovered via community share.`;
    
    const newTool = {
      id: masterAITools.length + Date.now(),
      name: `${randomName}`,
      url: `https://${randomName.toLowerCase().replace(/\s/g, '')}.ai`,
      description: randomDesc,
      category: randomCat,
      icon: "fas fa-cloud-arrow-up",
      featured: false
    };
    
    masterAITools.push(newTool);
    renderDashboard();
    
    // Show notification
    const toast = document.createElement("div");
    toast.className = "fixed bottom-5 right-5 glass-panel px-4 py-2 text-sm z-50";
    toast.innerHTML = `<i class="fas fa-plus-circle text-emerald-400 mr-2"></i> New tool "${randomName}" added!`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // Initialize event listeners
  function initEventListeners() {
    const searchBox = document.getElementById("globalSearch");
    const categorySelect = document.getElementById("categorySelector");
    const catPills = document.querySelectorAll("[data-cat]");
    const refreshBtn = document.getElementById("manualRefreshBtn");
    const suggestBtn = document.getElementById("simulateNewToolBtn");
    
    if (searchBox) {
      searchBox.addEventListener("input", (e) => { 
        currentSearch = e.target.value; 
        renderDashboard(); 
      });
    }
if (categorySelect) {
      categorySelect.addEventListener("change", (e) => { 
        currentCategory = e.target.value;
        catPills.forEach(btn => { 
          if(btn.getAttribute("data-cat") === currentCategory) {
            btn.classList.add("active"); 
          } else {
            btn.classList.remove("active");
          }
        });
        renderDashboard();
      });
    }
    
    catPills.forEach(btn => {
      btn.addEventListener("click", () => {
        currentCategory = btn.getAttribute("data-cat");
        if (categorySelect) categorySelect.value = currentCategory;
        catPills.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderDashboard();
      });
    });
    
    if (refreshBtn) {
      refreshBtn.addEventListener("click", () => {
        renderDashboard();
        const toast = document.createElement("div");
        toast.className = "fixed bottom-5 right-5 glass-panel px-4 py-2 text-sm z-50";
        toast.innerHTML = `<i class="fas fa-check-circle text-emerald-400 mr-2"></i> Dashboard refreshed! ${masterAITools.length} tools available`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      });
    }
    
    if (suggestBtn) {
      suggestBtn.addEventListener("click", addCommunityTool);
    }
  }

  // Set dynamic date
  function setDynamicDate() {
    const now = new Date();
    const dateElem = document.getElementById("dynamicDate");
    if (dateElem) {
      dateElem.innerHTML = now.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    }
    const lastUpdateElem = document.getElementById("lastUpdateTime");
    if (lastUpdateElem) {
      lastUpdateElem.innerHTML = now.toLocaleDateString();
    }
    const newTodayElem = document.getElementById("newTodayBadge");
    if (newTodayElem) {
      newTodayElem.innerHTML = `${Math.floor(Math.random() * 5)} new today ✨`;
    }
  }

  // Initialize everything
  function init() {
    renderDashboard();
    initEventListeners();
    setDynamicDate();
  }
  
  // Start the app
  init();
</script>
</body>
</html>
